version: 0.0
os: linux

files:
  - source: /
    destination: /home/ec2-user/my-flask-app

hooks:
  ApplicationStop:
    - location: scripts/stop_flask.sh
      timeout: 60
      runas: ec2-user

  AfterInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
      runas: ec2-user

  ApplicationStart:
    - location: scripts/start_flask.sh
      timeout: 60
      runas: ec2-user
